<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Hanuman Chalisa</title>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#efcf9d">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<link rel="apple-touch-icon" href="icon-192.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Rowdies:wght@300;400;700&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  html, body {
    height: 100%;
    overflow: hidden;
    font-family: 'Rowdies', cursive;
    background: #efcf9d;
    color: #5a2d0c;
    touch-action: none;
    -webkit-user-select: none;
    user-select: none;
  }

  /* Loading screen */
  .loader {
    position: fixed;
    inset: 0;
    z-index: 100;
    background: #efcf9d;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-direction: column;
    gap: 1.5rem;
    transition: opacity 0.5s ease;
  }

  .loader.hidden {
    opacity: 0;
    pointer-events: none;
  }

  .loader img {
    width: 180px;
    height: auto;
    animation: pulse 1.5s ease-in-out infinite;
  }

  .loader-text {
    font-size: 1.1rem;
    font-weight: 300;
    color: #8b4513;
    letter-spacing: 0.1em;
  }

  @keyframes pulse {
    0%, 100% { transform: scale(1); opacity: 1; }
    50% { transform: scale(1.05); opacity: 0.8; }
  }

  .container {
    position: relative;
    width: 100%;
    height: 100%;
  }

  .card {
    position: absolute;
    top: 0; left: 0;
    width: 100%;
    height: 100%;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-direction: column;
    padding: 2rem;
    will-change: transform, opacity;
    transition: transform 0.45s cubic-bezier(0.4, 0, 0.2, 1),
                opacity 0.45s cubic-bezier(0.4, 0, 0.2, 1);
  }

  .card-inner {
    width: 100%;
    text-align: center;
    padding: 0 1.5rem;
  }

  .card-text {
    font-size: clamp(12px, 3.6vw, 22px);
    font-weight: 300;
    line-height: 2.4;
    letter-spacing: 0.02em;
    white-space: pre-line;
    text-transform: capitalize;
  }

  .card-image {
    width: 280px;
    height: auto;
    margin-bottom: 1rem;
  }

  .card.title .card-text {
    font-size: 1.8rem;
    font-weight: 700;
    color: #8b4513;
    line-height: 1.3;
  }

  .dots {
    position: fixed;
    bottom: 2rem;
    left: 50%;
    transform: translateX(-50%);
    display: flex;
    flex-direction: row;
    gap: 0.35rem;
    z-index: 10;
  }

  .dot {
    width: 5px;
    height: 5px;
    border-radius: 50%;
    background: rgba(139, 69, 19, 0.3);
    transition: background 0.3s, transform 0.3s;
  }

  .dot.active {
    background: #8b4513;
    transform: scale(1.5);
  }
</style>
</head>
<body>

<div class="loader" id="loader">
  <img src="hanuman.png" alt="Hanuman">
  <div class="loader-text">Jai Shri Ram</div>
</div>

<div class="container" id="container"></div>
<div class="dots" id="dots"></div>

<script>
const cards = [
  { text: "", isTitle: true, image: "hanuman.png" },
  { text: "Shri Guru Charan Sarooja-raj\nNija manu Mukura Sudhaari\nBaranau Rahubhara Bimala\nYasha Jo Dayaka Phala Chari" },
  { text: "Budhee-Heen Thanu Jannikay\nSumirow Pavana Kumara\nBala-Budhee Vidya Dehoo Mohee\nHarahu Kalesha Vikaara" },
  { text: "Jai Hanuman gyan gun sagar\nJai Kapis tihun lok ujagar\nRam doot atulit bal dhama\nAnjaani-putra Pavan sut nama" },
  { text: "Mahabir Bikram Bajrangi\nKumati nivar sumati Ke sangi\nKanchan varan viraj subesa\nKanan Kundal Kunchit Kesha" },
  { text: "Hath Vajra Aur Dhuvaje Viraje\nKaandhe moonj janehu sajai\nSankar suvan kesri Nandan\nTej prataap maha jag vandan" },
  { text: "Vidyavaan guni ati chatur\nRam kaj karibe ko aatur\nPrabu charitra sunibe-ko rasiya\nRam Lakhan Sita man Basiya" },
  { text: "Sukshma roop dhari Siyahi dikhava\nVikat roop dhari lank jarava\nBhima roop dhari asur sanghare\nRamachandra ke kaj sanvare" },
  { text: "Laye Sanjivan Lakhan Jiyaye\nShri Raghuvir Harashi ur laye\nRaghupati Kinhi bahut badai\nTum mam priye Bharat-hi-sam bhai" },
  { text: "Sahas badan tumharo jash gaave\nAsa-kahi Shripati kanth lagaave\nSankadhik Brahmaadi Muneesa\nNarad-Sarad sahit Aheesa" },
  { text: "Jam Kuber Digpaal Jahan te\nKavi kovid kahi sake kahan te\nTum upkar Sugreevahin keenha\nRam milaye rajpad deenha" },
  { text: "Tumharo mantra Vibheeshan maana\nLankeshwar Bhaye Sub jag jana\nJug sahastra jojan par Bhanu\nLeelyo tahi madhur phal janu" },
  { text: "Prabhu mudrika meli mukh mahee\nJaladhi langhi gaye achraj nahee\nDurgaam kaj jagath ke jete\nSugam anugraha tumhre tete" },
  { text: "Ram dwaare tum rakhvare\nHoat na agya binu paisare\nSub sukh lahae tumhari sar na\nTum rakshak kahu ko dar naa" },
  { text: "Aapan tej samharo aapai\nTeenhon lok hank te kanpai\nBhoot pisaach Nikat nahin aavai\nMahavir jab naam sunavae" },
  { text: "Nase rog harae sab peera\nJapat nirantar Hanumant beera\nSankat se Hanuman chudavae\nMan Karam Vachan dyan jo lavai" },
  { text: "Sab par Ram tapasvee raja\nTin ke kaj sakal Tum saja\nAur manorath jo koi lavai\nSohi amit jeevan phal pavai" },
  { text: "Charon Yug partap tumhara\nHai persidh jagat ujiyara\nSadhu Sant ke tum Rakhware\nAsur nikandan Ram dulhare" },
  { text: "Ashta-sidhi nav nidhi ke dhata\nAs-var deen Janki mata\nRam rasayan tumhare pasa\nSada raho Raghupati ke dasa" },
  { text: "Tumhare bhajan Ram ko pavai\nJanam-janam ke dukh bisraavai\nAnth-kaal Raghuvir pur jayee\nJahan janam Hari-Bakht Kahayee" },
  { text: "Aur Devta Chit na dharehi\nHanumanth se hi sarve sukh karehi\nSankat kate-mite sab peera\nJo sumirai Hanumat Balbeera" },
  { text: "Jai Jai Jai Hanuman Gosahin\nKripa Karahu Gurudev ki nyahin\nJo sat bar path kare kohi\nChutehi bandhi maha sukh hohi" },
  { text: "Jo yah padhe Hanuman Chalisa\nHoye siddhi sakhi Gaureesa\nTulsidas sada hari chera\nKeejai Nath Hridaye mein dera" },
  { text: "Pavan Tanay Sankat Harana\nMangala Murati Roop\nRam Lakhan Sita Sahita\nHriday Basahu Soor Bhoop" }
];

const container = document.getElementById('container');
const dotsEl = document.getElementById('dots');
let current = 0;
let startY = 0;
let isDragging = false;
let dragOffset = 0;

// Build cards
cards.forEach((c, i) => {
  const el = document.createElement('div');
  el.className = 'card' + (c.isTitle ? ' title' : '');
  const imgHtml = c.image ? `<img class="card-image" src="${c.image}" alt="">` : '';
  el.innerHTML = `<div class="card-inner">${imgHtml}<div class="card-text">${c.text}</div></div>`;
  container.appendChild(el);

  const dot = document.createElement('div');
  dot.className = 'dot' + (i === 0 ? ' active' : '');
  dot.addEventListener('click', () => goTo(i));
  dotsEl.appendChild(dot);
});

const cardEls = container.querySelectorAll('.card');
const dotEls = dotsEl.querySelectorAll('.dot');

// Initial positioning
updateCards(false);

function updateCards(animate) {
  cardEls.forEach((el, i) => {
    const diff = i - current;
    const t = animate ? 'transform 0.45s cubic-bezier(0.4,0,0.2,1), opacity 0.45s cubic-bezier(0.4,0,0.2,1)' : 'none';
    el.style.transition = t;
    if (diff === 0) {
      el.style.transform = 'translateY(0) scale(1)';
      el.style.opacity = '1';
    } else {
      const dir = diff > 0 ? 1 : -1;
      el.style.transform = `translateY(${dir * 60}%) scale(0.85)`;
      el.style.opacity = '0';
    }
  });
  dotEls.forEach((d, i) => d.classList.toggle('active', i === current));
}

function goTo(index) {
  current = Math.max(0, Math.min(cards.length - 1, index));
  updateCards(true);
}

// Touch
container.addEventListener('touchstart', e => {
  startY = e.touches[0].clientY;
}, { passive: true });

container.addEventListener('touchend', e => {
  const dy = e.changedTouches[0].clientY - startY;
  const threshold = 50;
  if (dy < -threshold) goTo(current + 1);
  else if (dy > threshold) goTo(current - 1);
});

// Mouse wheel
let wheelTimeout;
container.addEventListener('wheel', e => {
  e.preventDefault();
  clearTimeout(wheelTimeout);
  wheelTimeout = setTimeout(() => {
    if (e.deltaY > 20) goTo(current + 1);
    else if (e.deltaY < -20) goTo(current - 1);
  }, 50);
}, { passive: false });

// Keyboard
document.addEventListener('keydown', e => {
  if (e.key === 'ArrowDown' || e.key === ' ') { e.preventDefault(); goTo(current + 1); }
  if (e.key === 'ArrowUp') { e.preventDefault(); goTo(current - 1); }
});

// Loading screen
window.addEventListener('load', () => {
  setTimeout(() => {
    document.getElementById('loader').classList.add('hidden');
  }, 1500);
});

// Register service worker
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('./sw.js');
}
</script>
</body>
</html>
